### Site Settings ###
title               : Michael Herring
description         : >-
                      Michael Herring makes cool things.
baseurl             : ""
repository          : mpherring09.mpherring09.github.io
open_new_tab        : true                    # Opens external URLs in new tab (works for posts, projects and navbar only)

### Sass ###
sass:
  sass_dir: _sass
  style: compressed

### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:                                            # The following paths are excluded from navbar
  - pages/tags.html
  - pages/404.html
  - pages/index.md


### Author Info ###
author:
  name              : Michael Herring
  image             : https://i.imgur.com/uyDNQnn.jpg
  email             : mpherring09@gmail.com
  linkedin          : michael-herring-274197231

### Collections ###
collections:
  projects:
    output: true
    permalink: /projects/:name


### Defaults for collections ###
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"


### Exclude from processing ###
exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - "*.log"
