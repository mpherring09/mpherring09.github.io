<svg viewBox="0 0 100 50" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <style>
    .spinner_9y7u{
      animation:spinner_fUkk 2.4s linear infinite;
      animation-delay:-2.4s;
      fill:#5eabac;
    }
    .spinner_DF2s{animation-delay:-1.6s}
    .spinner_q27e{animation-delay:-.8s}
    @keyframes spinner_fUkk{
      8.33%{x:13px;y:1px}
      25%{x:13px;y:1px}
      33.3%{x:13px;y:13px}
      50%{x:13px;y:13px}
      58.33%{x:1px;y:13px}
      75%{x:1px;y:13px}
      83.33%{x:1px;y:1px}
    }
    .loading-text {
      fill: #5eabac;
      font-family: sans-serif;
      font-size: 2.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.8;
    }
  </style>

  <!-- Spinner Group: Moved up to y=10 to clear space -->
  <g transform="translate(38, 10)">
    <rect class="spinner_9y7u" x="1" y="1" rx="1" width="10" height="10"></rect>
    <rect class="spinner_9y7u spinner_DF2s" x="1" y="1" rx="1" width="10" height="10"></rect>
    <rect class="spinner_9y7u spinner_q27e" x="1" y="1" rx="1" width="10" height="10"></rect>
  </g>

  <!-- Text: Moved down to y=38 to prevent overlap -->
  <text x="50" y="38" text-anchor="middle" class="loading-text">Video Loading</text>
</svg>
