{% if include.block %}
  {%- assign block_style = "btn-block" -%}
{%- else -%}
  {%- assign block_style = "" -%}
{%- endif -%}

<a class="my-4 btn btn-{{ include.style | default: 'outline-primary' }} btn-{{ include.size | default: 'md' }} {{ block_style }}"
  href="{{ include.link | default: '#' }}"
  target="_blank">
  {{ include.text | default: "Button" }}
</a>
