<video 
  autoplay 
  loop 
  muted 
  playsinline 
  {% if include.top %}
    preload="auto"
    fetchpriority="high"
  {% else %}
    preload="none"
    loading="lazy"
  {% endif %}
  {% if include.poster %}
    poster="{{ include.poster | relative_url }}"
  {% endif %}
  style="width: 100%; height: auto; display: block;"
>
  <source src="{{ include.src | relative_url }}" type="video/mp4">
  Your browser does not support the video tag.
</video>
