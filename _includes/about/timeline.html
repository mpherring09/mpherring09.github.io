<div class="col mt-4">
  <div class="timeline-body bg-themed">
    {% for item in site.data.timeline %}
      <div class="timeline-item">
        <div class="content">
          <h2>{{ item.title | markdownify}}</h2>
          <p>{{ item.description | markdownify}}</p>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
